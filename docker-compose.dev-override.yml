# Development override - mount local code for frontend hot reload.
# Usage: make dev (starts the production-shaped stack with code mounting)

services:
  backend:
    volumes:
      # Mount local code (overrides built-in code)
      - ./orchestrator:/app/orchestrator:ro
      - ./.mcp.json:/app/.mcp.json:ro
      - ./.claude:/app/.claude:ro
      - ./package.json:/app/package.json:ro
      # Mount updated supervisord config (includes agent_worker)
      - ./supervisord.conf:/etc/supervisor/conf.d/supervisord.conf:ro
      # Keep these from prod (writable)
      - runs_data:/app/runs
      - logs_data:/app/logs
      - data_dir:/app/data
      - test_results:/app/test-results
      - ${SPECS_DIR:-./specs}:/app/specs
      - ${PRDS_DIR:-./prds}:/app/prds
      - ${TESTS_DIR:-./tests}:/app/tests
    # Backend source is mounted for local edits; uvicorn reload stays disabled
    # to avoid Docker Desktop bind-mount import races.
    command: ["/usr/bin/supervisord", "-c", "/etc/supervisor/conf.d/supervisord.conf"]
    environment:
      # Keep local code mounted, but avoid uvicorn --reload multiprocessing on
      # Docker Desktop bind mounts. The reloader can raise Errno 35 while
      # importing from the mounted /app/orchestrator tree during startup.
      UVICORN_RELOAD: "false"
      PYTHONDONTWRITEBYTECODE: "1"
      HOME: /home/agent
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-glm-5.1}
      ANTHROPIC_DEFAULT_OPUS_MODEL: ${ANTHROPIC_DEFAULT_OPUS_MODEL:-glm-5.1}
      ANTHROPIC_DEFAULT_SONNET_MODEL: ${ANTHROPIC_DEFAULT_SONNET_MODEL:-glm-5-turbo}
      ANTHROPIC_DEFAULT_HAIKU_MODEL: ${ANTHROPIC_DEFAULT_HAIKU_MODEL:-glm-4.5-air}
      ANTHROPIC_CHAT_MODEL: ${ANTHROPIC_CHAT_MODEL:-glm-5-turbo}
      ANTHROPIC_ENABLE_CHAT_THINKING: ${ANTHROPIC_ENABLE_CHAT_THINKING:-false}
      API_TIMEOUT_MS: ${API_TIMEOUT_MS:-3000000}

  custom-workflow-worker:
    volumes:
      - ./orchestrator:/app/orchestrator:ro
      - ./.claude:/app/.claude:ro
      - ./scripts:/app/scripts:ro
      - runs_data:/app/runs
      - logs_data:/app/logs
      - data_dir:/app/data
      - test_results:/app/test-results
      - ${SPECS_DIR:-./specs}:/app/specs
      - ${PRDS_DIR:-./prds}:/app/prds
      - ${TESTS_DIR:-./tests}:/app/tests
    environment:
      PYTHONDONTWRITEBYTECODE: "1"

  frontend:
    volumes:
      # Mount local web code for Next.js hot reload
      - ./web/src:/app/src:ro
      - ./web/public:/app/public:ro
      # Mount env file for AI assistant config
      - ./web/.env.local:/app/.env.local:ro
    # Use next dev for hot reload with mounted source files
    command: ["npm", "run", "dev"]
    environment:
      # Enable Next.js development mode features
      NODE_ENV: development
      # Increase Node.js heap for large page compilation in dev mode
      NODE_OPTIONS: "--max-old-space-size=2048"
      # AI Assistant env vars (server-side only, passed from root .env.prod)
      ANTHROPIC_API_KEY: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_AUTH_TOKENS: ${ANTHROPIC_AUTH_TOKENS:-}
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-https://api.z.ai/api/anthropic}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-glm-5.1}
      ANTHROPIC_CHAT_MODEL: ${ANTHROPIC_CHAT_MODEL:-glm-5-turbo}
      ANTHROPIC_ENABLE_CHAT_THINKING: ${ANTHROPIC_ENABLE_CHAT_THINKING:-false}
      API_TIMEOUT_MS: ${API_TIMEOUT_MS:-3000000}
      INTERNAL_API_URL: http://backend:8001
    deploy:
      resources:
        limits:
          memory: 4G

volumes:
  runs_data:
  logs_data:
  data_dir:
  test_results:
