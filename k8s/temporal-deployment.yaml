apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal
  namespace: quorvex
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/component: workflow-engine
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal
  template:
    metadata:
      labels:
        app: temporal
    spec:
      containers:
      - name: temporal
        image: temporalio/auto-setup:1.24
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 7233
          name: grpc
        env:
        - name: DB
          value: "postgres12"
        - name: DB_PORT
          value: "5432"
        - name: POSTGRES_SEEDS
          value: "postgres"
        - name: POSTGRES_USER
          valueFrom:
            secretKeyRef:
              name: quorvex-secrets
              key: postgres-user
        - name: POSTGRES_PWD
          valueFrom:
            secretKeyRef:
              name: quorvex-secrets
              key: postgres-password
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "1"
---
apiVersion: v1
kind: Service
metadata:
  name: temporal
  namespace: quorvex
  labels:
    app.kubernetes.io/name: temporal
    app.kubernetes.io/component: workflow-engine
spec:
  selector:
    app: temporal
  ports:
  - name: grpc
    port: 7233
    targetPort: 7233
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: temporal-ui
  namespace: quorvex
  labels:
    app.kubernetes.io/name: temporal-ui
    app.kubernetes.io/component: workflow-engine-ui
spec:
  replicas: 1
  selector:
    matchLabels:
      app: temporal-ui
  template:
    metadata:
      labels:
        app: temporal-ui
    spec:
      containers:
      - name: temporal-ui
        image: temporalio/ui:2.31.2
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
          name: http
        env:
        - name: TEMPORAL_ADDRESS
          value: "temporal:7233"
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: temporal-ui
  namespace: quorvex
  labels:
    app.kubernetes.io/name: temporal-ui
    app.kubernetes.io/component: workflow-engine-ui
spec:
  selector:
    app: temporal-ui
  ports:
  - name: http
    port: 8080
    targetPort: 8080
