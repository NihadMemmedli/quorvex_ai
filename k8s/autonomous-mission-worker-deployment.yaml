apiVersion: apps/v1
kind: Deployment
metadata:
  name: autonomous-mission-worker
  namespace: quorvex
  labels:
    app.kubernetes.io/name: autonomous-mission-worker
    app.kubernetes.io/component: worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: autonomous-mission-worker
  template:
    metadata:
      labels:
        app: autonomous-mission-worker
    spec:
      containers:
      - name: autonomous-mission-worker
        image: quorvex-backend:latest
        imagePullPolicy: IfNotPresent
        command: ["python", "-m", "orchestrator.services.autonomous_mission_worker"]
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: quorvex-secrets
              key: database-url
        - name: REDIS_URL
          value: "redis://redis:6379/0"
        - name: TEMPORAL_ADDRESS
          value: "temporal:7233"
        - name: TEMPORAL_NAMESPACE
          value: "default"
        - name: TEMPORAL_TASK_QUEUE
          value: "quorvex-autonomous-missions"
        - name: ANTHROPIC_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: quorvex-secrets
              key: anthropic-token
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: quorvex-secrets
              key: anthropic-token
        - name: ANTHROPIC_BASE_URL
          valueFrom:
            configMapKeyRef:
              name: quorvex-config
              key: anthropic-base-url
        - name: ANTHROPIC_MODEL
          valueFrom:
            configMapKeyRef:
              name: quorvex-config
              key: anthropic-model
        - name: ANTHROPIC_DEFAULT_OPUS_MODEL
          valueFrom:
            configMapKeyRef:
              name: quorvex-config
              key: anthropic-opus-model
        - name: ANTHROPIC_DEFAULT_SONNET_MODEL
          valueFrom:
            configMapKeyRef:
              name: quorvex-config
              key: anthropic-sonnet-model
        - name: ANTHROPIC_DEFAULT_HAIKU_MODEL
          valueFrom:
            configMapKeyRef:
              name: quorvex-config
              key: anthropic-haiku-model
        - name: ANTHROPIC_CHAT_MODEL
          valueFrom:
            configMapKeyRef:
              name: quorvex-config
              key: anthropic-chat-model
        - name: API_TIMEOUT_MS
          valueFrom:
            configMapKeyRef:
              name: quorvex-config
              key: api-timeout-ms
        - name: OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: quorvex-secrets
              key: openai-api-key
              optional: true
        resources:
          requests:
            memory: "1Gi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "1"
        volumeMounts:
        - name: runs
          mountPath: /app/runs
        - name: logs
          mountPath: /app/logs
        - name: specs
          mountPath: /app/specs
        - name: tests
          mountPath: /app/tests
        - name: test-results
          mountPath: /app/test-results
        - name: prds
          mountPath: /app/prds
        - name: data
          mountPath: /app/data
      volumes:
      - name: runs
        persistentVolumeClaim:
          claimName: runs-pvc
      - name: logs
        persistentVolumeClaim:
          claimName: logs-pvc
      - name: specs
        persistentVolumeClaim:
          claimName: specs-pvc
      - name: tests
        persistentVolumeClaim:
          claimName: tests-pvc
      - name: test-results
        persistentVolumeClaim:
          claimName: test-results-pvc
      - name: prds
        persistentVolumeClaim:
          claimName: prds-pvc
      - name: data
        persistentVolumeClaim:
          claimName: data-pvc
