[pytest]
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function
pythonpath = .
markers =
    integration: marks tests requiring external services (deselect with '-m "not integration"')
    project_isolation: focused tests for cross-project data and route isolation
    backend_negative: backend tests for omitted-project and wrong-project behavior
    project_switching: frontend or e2e tests for project switch stale-state behavior
