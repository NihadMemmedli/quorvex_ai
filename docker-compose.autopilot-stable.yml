# Stable local runtime for trying Auto Pilot end-to-end.
#
# Use this when validating Auto Pilot behavior. It disables backend hot reload,
# raises frontend memory, and lowers local AI/browser concurrency so page loads
# remain responsive while agents are running. Browser execution stays headed so
# the live browser view can display active AutoPilot and autonomous mission browser work.

services:
  backend:
    environment:
      UVICORN_RELOAD: "false"
      HEADLESS: "false"
      PLAYWRIGHT_HEADLESS: "false"
      VNC_ENABLED: "true"
      VNC_PUBLIC_WS_URL: ${VNC_PUBLIC_WS_URL:-ws://localhost:6080/websockify}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-quorvex-autonomous-missions}
      TEMPORAL_WORKFLOW_TASK_QUEUE: ${TEMPORAL_WORKFLOW_TASK_QUEUE:-quorvex-custom-workflows}
      TEMPORAL_BROWSER_WORKFLOW_TASK_QUEUE: ${TEMPORAL_BROWSER_WORKFLOW_TASK_QUEUE:-quorvex-browser-workflows}
      USE_AGENT_QUEUE: "false"
      BROWSER_WORKERS_ENABLED: "false"
      DEFAULT_PARALLELISM: ${AUTOPILOT_DEFAULT_PARALLELISM:-2}
      PLAYWRIGHT_WORKERS: ${AUTOPILOT_PLAYWRIGHT_WORKERS:-1}
      MAX_CONCURRENT_AGENTS: ${AUTOPILOT_MAX_CONCURRENT_AGENTS:-2}
      MAX_CONCURRENT_EXPLORATIONS: ${AUTOPILOT_MAX_CONCURRENT_EXPLORATIONS:-1}
      MAX_CONCURRENT_PRD: ${AUTOPILOT_MAX_CONCURRENT_PRD:-1}
    deploy:
      resources:
        limits:
          memory: 12G
          cpus: "8"
        reservations:
          memory: 4G
          cpus: "2"

  autonomous-mission-worker:
    # In the stable local stack, the VNC browser-runtime owns autonomous mission
    # polling so browser work is visible instead of split across a headless worker.
    command: /bin/sh -c 'echo "Autonomous mission worker handled by browser-runtime in autopilot-stable"; exec sleep infinity'
    environment:
      HEADLESS: "false"
      PLAYWRIGHT_HEADLESS: "false"
      VNC_ENABLED: "true"
      VNC_PUBLIC_WS_URL: ${VNC_PUBLIC_WS_URL:-ws://localhost:6080/websockify}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-quorvex-autonomous-missions}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/playwright_agent

  browser-runtime:
    environment:
      AUTONOMOUS_MISSION_WORKER_ENABLED: "true"
      CUSTOM_WORKFLOW_WORKER_ENABLED: "true"
      HEADLESS: "false"
      PLAYWRIGHT_HEADLESS: "false"
      VNC_ENABLED: "true"
      VNC_PUBLIC_WS_URL: ${VNC_PUBLIC_WS_URL:-ws://localhost:6080/websockify}
      TEMPORAL_TASK_QUEUE: ${TEMPORAL_TASK_QUEUE:-quorvex-autonomous-missions}
      TEMPORAL_WORKFLOW_TASK_QUEUE: ${TEMPORAL_WORKFLOW_TASK_QUEUE:-quorvex-custom-workflows}
      TEMPORAL_BROWSER_WORKFLOW_TASK_QUEUE: ${TEMPORAL_BROWSER_WORKFLOW_TASK_QUEUE:-quorvex-browser-workflows}
      DATABASE_URL: postgresql://postgres:postgres@db:5432/playwright_agent

  frontend:
    environment:
      CLAUDE_CODE_OAUTH_TOKEN: ${CLAUDE_CODE_OAUTH_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-gpt-4o-mini}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      NODE_OPTIONS: "--max-old-space-size=2048"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
