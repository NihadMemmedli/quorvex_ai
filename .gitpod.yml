image: gitpod/workspace-full

tasks:
  - name: Setup & Start
    init: |
      cp .env.example .env
      make setup
    command: make dev

ports:
  - port: 3000
    onOpen: open-preview
    name: Frontend (Next.js)
  - port: 8001
    onOpen: ignore
    name: Backend API (FastAPI)

vscode:
  extensions:
    - ms-python.python
    - ms-playwright.playwright
    - bradlc.vscode-tailwindcss
    - dbaeumer.vscode-eslint
    - charliermarsh.ruff
