name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

permissions:
  contents: read

jobs:
  python-lint:
    name: Python lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Ruff lint
        run: ruff check orchestrator

  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          if [ -f orchestrator/requirements.txt ]; then pip install -r orchestrator/requirements.txt; fi
          pip install pytest pytest-asyncio pytest-cov

      - name: Run unit tests
        env:
          JWT_SECRET_KEY: test-secret-key-for-ci
          REQUIRE_AUTH: "false"
          DATABASE_URL: "sqlite:///./test.db"
        run: |
          python -m pytest orchestrator/tests -v -m "not integration" --ignore=orchestrator/tests/integration --cov=orchestrator --cov-report=term-missing --cov-report=xml

  frontend-typecheck:
    name: Frontend typecheck
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Type check frontend
        run: npm --prefix web run typecheck

  frontend-lint:
    name: Frontend lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Lint frontend
        run: npm --prefix web run lint

  frontend-build:
    name: Frontend build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm --prefix web ci

      - name: Build frontend
        run: npm --prefix web run build
