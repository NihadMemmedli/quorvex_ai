name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  python-checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        if [ -f orchestrator/requirements.txt ]; then pip install -r orchestrator/requirements.txt; fi

    - name: Install test tools
      run: pip install pytest pytest-asyncio pytest-cov

    - name: Run Tests
      env:
        JWT_SECRET_KEY: test-secret-key-for-ci
        REQUIRE_AUTH: "false"
        DATABASE_URL: "sqlite:///./test.db"
      # Only run non-integration tests (exclude tests requiring external services)
      run: |
        python -m pytest orchestrator/tests -v -m "not integration" --ignore=orchestrator/tests/integration --cov=orchestrator --cov-report=term-missing --cov-report=xml

  node-checks:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js 20
      uses: actions/setup-node@v4
      with:
        node-version: 20

    - name: Install web dependencies
      run: cd web && npm ci

    - name: Type check frontend
      run: npm --prefix web run typecheck

    - name: Build frontend
      run: cd web && npm run build
