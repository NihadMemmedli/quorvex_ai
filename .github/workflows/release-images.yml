name: Release Images

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: backend
            image: backend
            context: .
            file: Dockerfile
            target: backend
            build-args: ""
          - name: backend-slim
            image: backend-slim
            context: .
            file: docker/backend-slim/Dockerfile
            target: ""
            build-args: ""
          - name: frontend
            image: frontend
            context: ./web
            file: ./web/Dockerfile
            target: ""
            build-args: |
              NEXT_PUBLIC_API_URL=
          - name: browser-worker
            image: browser-worker
            context: .
            file: docker/browser-worker/Dockerfile
            target: ""
            build-args: ""
          - name: k6-worker
            image: k6-worker
            context: .
            file: docker/k6-worker/Dockerfile
            target: ""
            build-args: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image namespace
        id: names
        shell: bash
        run: |
          owner="${GITHUB_REPOSITORY_OWNER,,}"
          echo "namespace=ghcr.io/${owner}/quorvex-ai" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.names.outputs.namespace }}/${{ matrix.image }}
          tags: |
            type=ref,event=tag
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}

      - name: Build and push targeted image
        if: ${{ matrix.target != '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Build and push image
        if: ${{ matrix.target == '' }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build-args }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
